{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .face-card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        max-width: 760px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .face-title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 16px;
    }

    video {
        width: 100%;
        max-width: 420px;
        border-radius: 14px;
        background: #111827;
    }

    .btn {
        border: none;
        padding: 12px 18px;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .btn-blue {
        background: #2563eb;
    }

    .btn-green {
        background: #16a34a;
    }

    .status-box {
        margin-top: 12px;
        padding: 12px;
        border-radius: 10px;
        font-weight: bold;
    }

    .status-success {
        background: #dcfce7;
        color: #166534;
    }

    .status-error {
        background: #fee2e2;
        color: #991b1b;
    }

    .status-warning {
        background: #fef3c7;
        color: #92400e;
    }
</style>

<div class="face-card">
    <div class="face-title">📸 ลงทะเบียนใบหน้า</div>

    <video id="video" autoplay muted playsinline></video>

    <div style="margin-top:10px;">
        <button class="btn btn-blue" onclick="startCamera()">เปิดกล้อง</button>
        <button class="btn btn-green" onclick="registerFace()">บันทึกใบหน้า</button>
    </div>

    <div id="status" class="status-box">รอโหลดระบบ...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
    const video = document.getElementById('video');
    const statusBox = document.getElementById('status');
    const MODEL_URL = "{% static 'models' %}";

    let modelsLoaded = false;
    let cameraStarted = false;

    function setStatus(msg, type = 'normal') {
        statusBox.textContent = msg;
        statusBox.className = 'status-box';
        if (type === 'success') statusBox.classList.add('status-success');
        if (type === 'error') statusBox.classList.add('status-error');
        if (type === 'warning') statusBox.classList.add('status-warning');
    }

    async function loadModels() {
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

            modelsLoaded = true;
            setStatus("✅ โหลดระบบสำเร็จ กรุณากดเปิดกล้อง", "success");
        } catch (err) {
            setStatus("❌ โหลดระบบจดจำใบหน้าไม่สำเร็จ", "error");
            console.error(err);
        }
    }

    window.onload = loadModels;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: false
            });

            video.srcObject = stream;
            cameraStarted = true;

            setStatus("✅ กล้องพร้อมแล้ว กรุณามองตรงแล้วกดบันทึกใบหน้า", "success");
        } catch (err) {
            setStatus("❌ เปิดกล้องไม่สำเร็จ: " + err.message, "error");
        }
    }

    function getCookie(name) {
        let v = null;
        document.cookie.split(';').forEach(c => {
            c = c.trim();
            if (c.startsWith(name + '=')) {
                v = decodeURIComponent(c.substring(name.length + 1));
            }
        });
        return v;
    }

    async function registerFace() {
        if (!modelsLoaded) {
            return setStatus("⏳ กรุณารอโหลดระบบก่อน", "warning");
        }

        if (!cameraStarted || !video.srcObject) {
            return setStatus("⚠️ กรุณากดเปิดกล้องก่อน", "warning");
        }

        setStatus("กำลังตรวจจับใบหน้า...", "warning");

        const result = await faceapi
            .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (!result) {
            return setStatus("❌ ไม่พบใบหน้า กรุณามองตรงเข้ากล้อง", "error");
        }

        const res = await fetch("{% url 'save_face_descriptor' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                descriptor: Array.from(result.descriptor)
            })
        });

        const data = await res.json();

        if (data.success) {
            setStatus("✅ บันทึกใบหน้าสำเร็จ", "success");
        } else {
            setStatus("❌ " + data.message, "error");
        }
    }
</script>

{% endblock %}
