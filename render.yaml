services:
  - type: web
    name: django-checkin
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn myproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: django-checkin-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: django-checkin-db